# ClusterIP — 클러스터 내부(frontend nginx)에서만 접근 가능. 외부에는 노출하지 않습니다.
# frontend nginx.conf 의 proxy_pass http://backend:8000 이 이 서비스를 가리킵니다.
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: libraian
spec:
  selector:
    app: backend
  ports:
    - port:       8000
      targetPort: 8000
  type: ClusterIP
