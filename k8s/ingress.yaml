# nginx Ingress Controller 가 클러스터에 설치돼 있어야 합니다.
# host: 를 실제 도메인으로 바꿔주세요.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: libraian-ingress
  namespace: libraian
  annotations:
    # HTTPS 자동 발급 (cert-manager 사용 시 주석 해제)
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "90"
spec:
  ingressClassName: nginx
  rules:
    - host: yourdomain.com   # ← 실제 도메인으로 교체
      http:
        paths:
          - path:     /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
  # HTTPS 사용 시 주석 해제 (cert-manager 필요)
  # tls:
  #   - hosts:
  #       - yourdomain.com
  #     secretName: libraian-tls
