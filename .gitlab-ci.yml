# ================================================================
# GitLab CI/CD — AWS ECR + EKS
#
# GitLab 프로젝트 → Settings → CI/CD → Variables 에 등록 필요:
#   AWS_ACCESS_KEY_ID      — IAM 사용자 액세스 키 ID     (Masked)
#   AWS_SECRET_ACCESS_KEY  — IAM 사용자 시크릿 키        (Masked)
#   AWS_DEFAULT_REGION     — ap-northeast-2
#   AWS_ACCOUNT_ID         — AWS 계정 ID (12자리 숫자)
# ================================================================

stages:
  - build
  - deploy

variables:
  ECR_REGISTRY:   "$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com"
  FRONTEND_IMAGE: "$ECR_REGISTRY/libraian/frontend"
  BACKEND_IMAGE:  "$ECR_REGISTRY/libraian/backend"

# ── 공통: ECR 로그인 스크립트 ────────────────────────────────
.ecr_login: &ecr_login
  - aws ecr get-login-password --region $AWS_DEFAULT_REGION
    | docker login --username AWS --password-stdin $ECR_REGISTRY

# ── 1. 프론트엔드 이미지 빌드 → ECR push ─────────────────────
build-frontend:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  before_script:
    - apk add --no-cache aws-cli
    - *ecr_login
  script:
    - |
      docker build \
        --build-arg VITE_API_URL=/api \
        -t $FRONTEND_IMAGE:$CI_COMMIT_SHA \
        -t $FRONTEND_IMAGE:latest \
        ./frontend
    - docker push $FRONTEND_IMAGE:$CI_COMMIT_SHA
    - docker push $FRONTEND_IMAGE:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# ── 2. 백엔드 이미지 빌드 → ECR push ────────────────────────
build-backend:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  before_script:
    - apk add --no-cache aws-cli
    - *ecr_login
  script:
    - |
      docker build \
        -t $BACKEND_IMAGE:$CI_COMMIT_SHA \
        -t $BACKEND_IMAGE:latest \
        ./backend
    - docker push $BACKEND_IMAGE:$CI_COMMIT_SHA
    - docker push $BACKEND_IMAGE:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# ── 3. EKS 배포 ──────────────────────────────────────────────
deploy:
  stage: deploy
  image:
    name: amazon/aws-cli:latest
    entrypoint: [""]
  needs:
    - build-frontend
    - build-backend
  before_script:
    # kubectl 설치
    - curl -LO "https://dl.k8s.io/release/$(curl -Ls https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
    - chmod +x kubectl && mv kubectl /usr/local/bin/
    # AWS CLI로 kubeconfig 자동 설정 (KUBE_CONFIG 변수 불필요)
    - aws eks update-kubeconfig --name libraian --region $AWS_DEFAULT_REGION
  script:
    - kubectl apply -f k8s/namespace.yaml
    - kubectl apply -f k8s/backend-configmap.yaml
    - kubectl apply -f k8s/backend-deployment.yaml
    - kubectl apply -f k8s/backend-service.yaml
    - kubectl apply -f k8s/frontend-deployment.yaml
    - kubectl apply -f k8s/frontend-service.yaml
    - kubectl apply -f k8s/ingress.yaml
    # 이번 커밋 SHA 이미지로 롤링 업데이트
    - kubectl set image deployment/frontend frontend=$FRONTEND_IMAGE:$CI_COMMIT_SHA -n libraian
    - kubectl set image deployment/backend  backend=$BACKEND_IMAGE:$CI_COMMIT_SHA  -n libraian
    # 배포 완료 대기
    - kubectl rollout status deployment/frontend -n libraian --timeout=120s
    - kubectl rollout status deployment/backend  -n libraian --timeout=120s
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  environment:
    name: production
