<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>책마루 — AI 도서 큐레이션</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&family=Pretendard:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink:       #1a1714;
    --ink-soft:  #4a4540;
    --ink-muted: #9a9590;
    --paper:     #f5f0e8;
    --paper-2:   #ede8dc;
    --paper-3:   #e2ddd0;
    --accent:    #8b4513;
    --accent-2:  #c4622a;
    --line:      rgba(26,23,20,0.12);
    --radius:    4px;
    --serif:     'Nanum Myeongjo', Georgia, serif;
    --sans:      'Pretendard', sans-serif;
  }

  html, body {
    height: 100%;
    background: var(--paper);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 15px;
    line-height: 1.6;
  }

  /* ── 레이아웃 ── */
  .shell {
    display: grid;
    grid-template-columns: 260px 1fr;
    grid-template-rows: 100vh;
    height: 100vh;
    overflow: hidden;
  }

  /* ── 사이드바 ── */
  .sidebar {
    background: var(--ink);
    color: var(--paper);
    display: flex;
    flex-direction: column;
    padding: 36px 28px;
    border-right: 1px solid rgba(255,255,255,0.06);
    position: relative;
    overflow: hidden;
  }

  .sidebar::before {
    content: '';
    position: absolute;
    inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.02'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    pointer-events: none;
  }

  .logo {
    font-family: var(--serif);
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.3px;
    margin-bottom: 6px;
    color: var(--paper);
  }

  .logo-sub {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(245,240,232,0.4);
    margin-bottom: 40px;
  }

  .section-label {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(245,240,232,0.35);
    margin-bottom: 12px;
  }

  /* 빠른 예시 버튼 */
  .quick-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 36px;
  }

  .quick-btn {
    background: none;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: var(--radius);
    color: rgba(245,240,232,0.7);
    font-family: var(--sans);
    font-size: 12.5px;
    line-height: 1.4;
    padding: 10px 14px;
    text-align: left;
    cursor: pointer;
    transition: all .18s;
    position: relative;
  }

  .quick-btn:hover {
    background: rgba(255,255,255,0.07);
    border-color: rgba(255,255,255,0.22);
    color: var(--paper);
    transform: translateX(3px);
  }

  .quick-btn::before {
    content: '›';
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    opacity: 0.4;
    font-size: 15px;
  }

  /* 상태 인디케이터 */
  .status-block {
    margin-top: auto;
    border-top: 1px solid rgba(255,255,255,0.08);
    padding-top: 20px;
  }

  .status-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: rgba(245,240,232,0.45);
    margin-bottom: 8px;
  }

  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #4ade80;
    box-shadow: 0 0 6px #4ade80;
    flex-shrink: 0;
  }

  .dot.off { background: #ef4444; box-shadow: 0 0 6px #ef4444; }

  .api-url {
    font-size: 11px;
    color: rgba(245,240,232,0.25);
    word-break: break-all;
  }

  /* ── 메인 채팅 영역 ── */
  .main {
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  /* 상단 헤더 */
  .topbar {
    padding: 20px 32px;
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--paper);
    flex-shrink: 0;
  }

  .topbar-title {
    font-family: var(--serif);
    font-size: 16px;
    color: var(--ink-soft);
  }

  .badge {
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 4px 10px;
    border: 1px solid var(--line);
    border-radius: 20px;
    color: var(--ink-muted);
  }

  /* 메시지 스크롤 영역 */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 32px;
    display: flex;
    flex-direction: column;
    gap: 24px;
    scroll-behavior: smooth;
  }

  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--paper-3); border-radius: 2px; }

  /* 빈 상태 */
  .empty-state {
    margin: auto;
    text-align: center;
    max-width: 360px;
    opacity: 0;
    animation: fadeUp .6s .2s forwards;
  }

  .empty-icon {
    font-size: 40px;
    margin-bottom: 20px;
    display: block;
  }

  .empty-state h2 {
    font-family: var(--serif);
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 10px;
    color: var(--ink);
  }

  .empty-state p {
    font-size: 14px;
    color: var(--ink-muted);
    line-height: 1.7;
  }

  /* 메시지 버블 */
  .msg {
    display: flex;
    gap: 14px;
    animation: fadeUp .3s ease forwards;
    max-width: 720px;
  }

  .msg.user { flex-direction: row-reverse; align-self: flex-end; }
  .msg.assistant { align-self: flex-start; }

  .avatar {
    width: 34px; height: 34px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .msg.user .avatar {
    background: var(--ink);
    color: var(--paper);
    font-family: var(--serif);
    font-weight: 700;
    font-size: 13px;
  }

  .msg.assistant .avatar {
    background: var(--accent);
    color: #fff;
    font-size: 16px;
  }

  .bubble {
    padding: 14px 18px;
    border-radius: 2px 12px 12px 12px;
    font-size: 14.5px;
    line-height: 1.7;
    max-width: 480px;
  }

  .msg.user .bubble {
    background: var(--ink);
    color: var(--paper);
    border-radius: 12px 2px 12px 12px;
  }

  .msg.assistant .bubble {
    background: #fff;
    color: var(--ink);
    border: 1px solid var(--line);
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);
  }

  /* 의도 배지 */
  .intent-tag {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    letter-spacing: 0.5px;
    padding: 3px 10px;
    border-radius: 20px;
    margin-bottom: 8px;
    font-family: var(--sans);
    font-weight: 500;
  }

  .intent-tag.recommendation { background: #fef3c7; color: #92400e; border: 1px solid #fde68a; }
  .intent-tag.clarification  { background: #e0f2fe; color: #0c4a6e; border: 1px solid #bae6fd; }
  .intent-tag.book_info      { background: #f0fdf4; color: #14532d; border: 1px solid #bbf7d0; }
  .intent-tag.general        { background: #f5f3ff; color: #4c1d95; border: 1px solid #ddd6fe; }
  .intent-tag.error          { background: #fef2f2; color: #7f1d1d; border: 1px solid #fecaca; }

  /* RAG 준비 완료 카드 */
  .rag-card {
    margin-top: 10px;
    padding: 12px 16px;
    background: var(--paper);
    border: 1px solid var(--line);
    border-left: 3px solid var(--accent);
    border-radius: 0 6px 6px 0;
    font-size: 13px;
    color: var(--ink-soft);
  }

  .rag-card strong {
    display: block;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 4px;
  }

  /* 추가 질문 카드 */
  .clarify-card {
    margin-top: 10px;
    padding: 12px 16px;
    background: #f0f9ff;
    border: 1px solid #bae6fd;
    border-radius: 6px;
    font-size: 13px;
    color: #0c4a6e;
  }

  .clarify-card strong {
    display: block;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #0369a1;
    margin-bottom: 4px;
  }

  /* 로딩 점 */
  .typing {
    display: flex;
    gap: 5px;
    padding: 16px 18px;
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 2px 12px 12px 12px;
    width: fit-content;
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);
  }

  .typing span {
    width: 7px; height: 7px;
    background: var(--ink-muted);
    border-radius: 50%;
    animation: bounce .9s infinite;
  }
  .typing span:nth-child(2) { animation-delay: .15s; }
  .typing span:nth-child(3) { animation-delay: .30s; }

  /* ── 입력 영역 ── */
  .input-area {
    padding: 20px 32px 24px;
    border-top: 1px solid var(--line);
    background: var(--paper);
    flex-shrink: 0;
  }

  .input-wrap {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    background: #fff;
    border: 1.5px solid var(--line);
    border-radius: 8px;
    padding: 12px 14px 12px 18px;
    transition: border-color .2s, box-shadow .2s;
  }

  .input-wrap:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(139,69,19,0.1);
  }

  textarea {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    font-family: var(--sans);
    font-size: 14.5px;
    color: var(--ink);
    resize: none;
    line-height: 1.6;
    min-height: 24px;
    max-height: 140px;
    overflow-y: auto;
  }

  textarea::placeholder { color: var(--ink-muted); }

  .send-btn {
    width: 36px; height: 36px;
    background: var(--ink);
    border: none;
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background .18s, transform .1s;
  }

  .send-btn:hover { background: var(--accent); }
  .send-btn:active { transform: scale(.93); }
  .send-btn:disabled { background: var(--paper-3); cursor: not-allowed; }

  .send-btn svg { width: 16px; height: 16px; fill: none; stroke: #fff; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  .hint {
    font-size: 11.5px;
    color: var(--ink-muted);
    margin-top: 8px;
    padding-left: 2px;
  }

  /* 설정 패널 (백엔드 URL) */
  .config-row {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
  }

  .config-input {
    flex: 1;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: var(--radius);
    color: rgba(245,240,232,0.7);
    font-family: var(--sans);
    font-size: 11.5px;
    padding: 7px 10px;
    outline: none;
    transition: border-color .18s;
  }

  .config-input:focus { border-color: rgba(255,255,255,0.3); }

  .config-save {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: var(--radius);
    color: rgba(245,240,232,0.7);
    font-family: var(--sans);
    font-size: 11.5px;
    padding: 7px 12px;
    cursor: pointer;
    transition: all .18s;
    white-space: nowrap;
  }

  .config-save:hover { background: rgba(255,255,255,0.18); color: var(--paper); }

  /* 스크롤바 (textarea) */
  textarea::-webkit-scrollbar { width: 4px; }
  textarea::-webkit-scrollbar-thumb { background: var(--paper-3); border-radius: 2px; }

  /* ── 애니메이션 ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); }
    40%           { transform: translateY(-6px); }
  }
</style>
</head>
<body>
<div class="shell">

  <!-- ── 사이드바 ── -->
  <aside class="sidebar">
    <div class="logo">책마루</div>
    <div class="logo-sub">AI Book Curation</div>

    <div class="section-label">백엔드 연결</div>
    <div class="config-row">
      <input class="config-input" id="api-url-input" type="text" value="http://localhost:8000" placeholder="http://localhost:8000">
      <button class="config-save" onclick="saveApiUrl()">저장</button>
    </div>

    <div class="section-label">빠른 예시</div>
    <ul class="quick-list">
      <li><button class="quick-btn" onclick="sendQuick('요즘 지쳐있는데 힐링되는 책 추천해줘')">힐링되는 책 추천</button></li>
      <li><button class="quick-btn" onclick="sendQuick('SF 소설 중에 최근에 나온 거 알려줘')">최신 SF 소설</button></li>
      <li><button class="quick-btn" onclick="sendQuick('채식주의자 어떤 내용이야?')">특정 책 정보</button></li>
      <li><button class="quick-btn" onclick="sendQuick('좋은 책')">모호한 질의 (추가질문 유도)</button></li>
      <li><button class="quick-btn" onclick="sendQuick('안녕!')">일반 인사</button></li>
    </ul>

    <div class="status-block">
      <div class="status-row">
        <span class="dot" id="status-dot"></span>
        <span id="status-text">백엔드 미연결</span>
      </div>
      <div class="api-url" id="api-url-display">localhost:8000</div>
    </div>
  </aside>

  <!-- ── 메인 ── -->
  <main class="main">
    <header class="topbar">
      <span class="topbar-title">대화</span>
      <div style="display:flex;gap:10px;align-items:center">
        <button class="badge" style="cursor:pointer;background:none;border:1px solid var(--line);font-family:var(--sans)" onclick="clearChat()">대화 초기화</button>
        <span class="badge">HCX-DASH-002</span>
      </div>
    </header>

    <div class="messages" id="messages">
      <div class="empty-state" id="empty-state">
        <span class="empty-icon">📚</span>
        <h2>어떤 책을 찾고 계신가요?</h2>
        <p>장르, 분위기, 주제 어떤 것이든 말씀해주세요.<br>AI가 의도를 파악해 딱 맞는 책을 찾아드립니다.</p>
      </div>
    </div>

    <div class="input-area">
      <div class="input-wrap">
        <textarea
          id="query-input"
          rows="1"
          placeholder="책에 대해 무엇이든 물어보세요…"
          onkeydown="handleKey(event)"
          oninput="autoResize(this)"
        ></textarea>
        <button class="send-btn" id="send-btn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
      <div class="hint">Enter로 전송 &nbsp;·&nbsp; Shift+Enter로 줄바꿈</div>
    </div>
  </main>

</div>

<script>
  // ── 상태 ──────────────────────────────────────────────────
  let apiBase = localStorage.getItem('apiBase') || 'http://localhost:8000';
  let history = [];
  let isLoading = false;

  // ── 초기화 ────────────────────────────────────────────────
  document.getElementById('api-url-input').value = apiBase;
  document.getElementById('api-url-display').textContent = apiBase.replace('http://', '');
  checkHealth();

  function saveApiUrl() {
    apiBase = document.getElementById('api-url-input').value.replace(/\/$/, '');
    localStorage.setItem('apiBase', apiBase);
    document.getElementById('api-url-display').textContent = apiBase.replace('http://', '');
    checkHealth();
  }

  async function checkHealth() {
    const dot  = document.getElementById('status-dot');
    const text = document.getElementById('status-text');
    try {
      const res = await fetch(`${apiBase}/api/health`, { signal: AbortSignal.timeout(3000) });
      if (res.ok) {
        dot.classList.remove('off');
        text.textContent = '백엔드 연결됨';
      } else throw new Error();
    } catch {
      dot.classList.add('off');
      text.textContent = '백엔드 미연결';
    }
  }

  // ── 전송 ──────────────────────────────────────────────────
  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 140) + 'px';
  }

  function sendQuick(text) {
    document.getElementById('query-input').value = text;
    autoResize(document.getElementById('query-input'));
    sendMessage();
  }

  async function sendMessage() {
    const input = document.getElementById('query-input');
    const query = input.value.trim();
    if (!query || isLoading) return;

    // 빈 상태 숨기기
    const emptyState = document.getElementById('empty-state');
    if (emptyState) emptyState.remove();

    isLoading = true;
    document.getElementById('send-btn').disabled = true;
    input.value = '';
    input.style.height = 'auto';

    // 사용자 메시지 렌더
    appendMessage('user', query);

    // 로딩 표시
    const loadingId = appendLoading();

    try {
      const res = await fetch(`${apiBase}/api/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          query,
          history,
          user_profile: null,
        }),
        signal: AbortSignal.timeout(15000),
      });

      removeLoading(loadingId);

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        appendAssistantError(err.detail || `서버 오류 (${res.status})`);
        return;
      }

      const data = await res.json();
      appendAssistantResponse(data);

      // 히스토리 업데이트
      history.push({ role: 'user', content: query });
      history.push({ role: 'assistant', content: data.message });

    } catch (err) {
      removeLoading(loadingId);
      if (err.name === 'TimeoutError') {
        appendAssistantError('응답 시간이 초과됐어요. 백엔드 서버가 실행 중인지 확인해주세요.');
      } else {
        appendAssistantError('백엔드 서버에 연결할 수 없어요. 사이드바에서 URL을 확인해주세요.');
      }
      checkHealth();
    } finally {
      isLoading = false;
      document.getElementById('send-btn').disabled = false;
    }
  }

  // ── 렌더링 헬퍼 ───────────────────────────────────────────
  function appendMessage(role, content) {
    const container = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    div.innerHTML = `
      <div class="avatar">${role === 'user' ? '나' : '📚'}</div>
      <div class="bubble">${escapeHtml(content)}</div>
    `;
    container.appendChild(div);
    scrollToBottom();
  }

  function appendAssistantResponse(data) {
    const container = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'msg assistant';

    const intentLabel = getIntentLabel(data.intent?.intent_type);
    const intentClass = getIntentClass(data.intent?.intent_type);
    const confidence  = data.intent?.confidence != null
      ? Math.round(data.intent.confidence * 100) + '%'
      : '';

    let extra = '';

    if (data.needs_clarification && data.clarification_question) {
      extra = `
        <div class="clarify-card">
          <strong>추가 질문</strong>
          ${escapeHtml(data.clarification_question)}
        </div>`;
    }

    if (data.ready_for_rag && data.search_query) {
      const filters = data.intent?.filters
        ? Object.entries(data.intent.filters).map(([k, v]) => `${k}: ${v}`).join(' · ')
        : '';
      extra += `
        <div class="rag-card">
          <strong>RAG 검색 쿼리</strong>
          "${escapeHtml(data.search_query)}"
          ${filters ? `<div style="margin-top:4px;font-size:12px;color:var(--ink-muted)">${escapeHtml(filters)}</div>` : ''}
        </div>`;
    }

    div.innerHTML = `
      <div class="avatar">📚</div>
      <div class="bubble">
        <div>
          <span class="intent-tag ${intentClass}">${intentLabel}${confidence ? ` · ${confidence}` : ''}</span>
        </div>
        ${escapeHtml(data.message)}
        ${extra}
      </div>
    `;
    container.appendChild(div);
    scrollToBottom();
  }

  function appendAssistantError(msg) {
    const container = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'msg assistant';
    div.innerHTML = `
      <div class="avatar">📚</div>
      <div class="bubble">
        <div><span class="intent-tag error">오류</span></div>
        ${escapeHtml(msg)}
      </div>
    `;
    container.appendChild(div);
    scrollToBottom();
  }

  function appendLoading() {
    const container = document.getElementById('messages');
    const id = 'loading-' + Date.now();
    const div = document.createElement('div');
    div.className = 'msg assistant';
    div.id = id;
    div.innerHTML = `
      <div class="avatar">📚</div>
      <div class="typing"><span></span><span></span><span></span></div>
    `;
    container.appendChild(div);
    scrollToBottom();
    return id;
  }

  function removeLoading(id) {
    document.getElementById(id)?.remove();
  }

  // ── 유틸 ──────────────────────────────────────────────────
  function getIntentLabel(type) {
    const map = {
      book_recommendation: '📖 도서 추천',
      book_info:           '🔍 도서 정보',
      general_chat:        '💬 일반 대화',
      clarification_needed:'❓ 추가 질문 필요',
    };
    return map[type] || '분석 중';
  }

  function getIntentClass(type) {
    const map = {
      book_recommendation: 'recommendation',
      book_info:           'book_info',
      general_chat:        'general',
      clarification_needed:'clarification',
    };
    return map[type] || 'general';
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/\n/g, '<br>');
  }

  function scrollToBottom() {
    const el = document.getElementById('messages');
    el.scrollTop = el.scrollHeight;
  }

  function clearChat() {
    history = [];
    const container = document.getElementById('messages');
    container.innerHTML = `
      <div class="empty-state" id="empty-state">
        <span class="empty-icon">📚</span>
        <h2>어떤 책을 찾고 계신가요?</h2>
        <p>장르, 분위기, 주제 어떤 것이든 말씀해주세요.<br>AI가 의도를 파악해 딱 맞는 책을 찾아드립니다.</p>
      </div>
    `;
  }

  // 3초마다 헬스 체크
  setInterval(checkHealth, 3000);
</script>
</body>
</html>
